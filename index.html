<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>迷因產生器 🔥 Meme Generator</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <h1>🔥 迷因產生器</h1>
    <p class="subtitle">輸入關鍵字，立刻獲得 10 張迷因圖</p>
  </header>

  <main>
    <div class="search-box">
      <input
        type="text"
        id="keyword-input"
        placeholder="輸入關鍵字，例如：程式設計、老闆、考試..."
        autocomplete="off"
      />
      <button id="generate-btn" onclick="generateMemes()">
        <span id="btn-text">產生迷因 🚀</span>
      </button>
    </div>

    <div id="loading" class="hidden">
      <div class="spinner"></div>
      <p>正在召喚迷因精靈...</p>
    </div>

    <div id="meme-grid" class="meme-grid"></div>
  </main>

  <footer>
    <p>Powered by <a href="https://imgflip.com/api" target="_blank">Imgflip API</a> | Made with 🧡</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
